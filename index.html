<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenshot Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
  #loginPage { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  #loginPage h1 { font-size: 2rem; margin-bottom: 8px; color: #fff; }
  .login-box { background: #16213e; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .login-box input { width: 100%; padding: 14px 16px; border: 1px solid #333; border-radius: 8px; background: #0f3460; color: #fff; font-size: 1rem; margin-bottom: 16px; outline: none; }
  .login-box input:focus { border-color: #e94560; }
  .login-box button { width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  .login-box button:hover { background: #d63a54; }
  #loginError { color: #ff6b6b; text-align: center; margin-top: 12px; font-size: 0.85rem; display: none; }
  #mainPage { display: none; min-height: 100vh; }
  .header { background: #16213e; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 1.2rem; color: #e94560; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-right .btn { background: #e94560; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .header-right .btn-outline { background: transparent; border: 1px solid #e94560; color: #e94560; }
  .header-right .count { color: #888; font-size: 0.85rem; }
  .upload-zone { margin: 24px; border: 2px dashed #333; border-radius: 12px; padding: 40px; text-align: center; transition: all 0.2s; cursor: pointer; }
  .upload-zone:hover, .upload-zone.dragover { border-color: #e94560; background: rgba(233,69,96,0.05); }
  .upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
  .upload-zone p { color: #888; }
  .upload-zone input { display: none; }
  #uploadProgress { display: none; margin: 16px 24px; background: #16213e; border-radius: 8px; padding: 16px; }
  #uploadProgress .bar-bg { background: #333; border-radius: 4px; height: 8px; overflow: hidden; }
  #uploadProgress .bar { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); width: 0%; transition: width 0.3s; }
  #uploadProgress .text { color: #888; font-size: 0.85rem; margin-top: 8px; text-align: center; }
  .toolbar { margin: 0 24px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .toolbar select, .toolbar input { padding: 8px 12px; border: 1px solid #333; border-radius: 6px; background: #16213e; color: #fff; font-size: 0.85rem; outline: none; }
  .toolbar select { min-width: 120px; }
  .toolbar input[type="text"] { flex: 1; min-width: 150px; }
  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin: 0 24px 24px; }
  .gallery-item { position: relative; border-radius: 12px; overflow: hidden; background: #16213e; cursor: pointer; transition: transform 0.2s; }
  .gallery-item:hover { transform: scale(1.02); }
  .gallery-item img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .gallery-item .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 24px 12px 12px; }
  .gallery-item .overlay span { font-size: 0.75rem; color: #ccc; }
  .gallery-item .delete-btn { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: none; }
  .gallery-item:hover .delete-btn { display: block; }
  #emptyState { text-align: center; padding: 60px 20px; color: #666; }
  #emptyState .icon { font-size: 4rem; margin-bottom: 16px; }
  #loadMoreBtn { display: none; margin: 0 24px 24px; padding: 12px; background: #16213e; border: 1px solid #333; border-radius: 8px; color: #888; cursor: pointer; width: calc(100% - 48px); }
  #loadMoreBtn:hover { border-color: #e94560; color: #e94560; }
  #previewModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
  #previewModal.show { display: flex; }
  #previewModal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
  #previewModal .close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; }
  #previewModal .nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 16px; border-radius: 8px; cursor: pointer; font-size: 1.5rem; }
  #previewModal .nav.prev { left: 20px; }
  #previewModal .nav.next { right: 20px; }
  #previewModal .info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #888; font-size: 0.85rem; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; z-index: 2000; animation: fadeIn 0.3s; }
  .toast.success { background: #10b981; color: #fff; }
  .toast.error { background: #ef4444; color: #fff; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div id="loginPage">
  <h1>Screenshot Gallery</h1>
  <p class="subtitle">Enter password to access</p>
  <div class="login-box">
    <input type="password" id="passwordInput" placeholder="Password" onkeypress="if(event.key==='Enter')login()">
    <button onclick="login()">Enter</button>
    <div id="loginError">Incorrect password</div>
  </div>
</div>
<div id="mainPage">
  <div class="header">
    <h1>Screenshot Gallery</h1>
    <div class="header-right">
      <span class="count" id="totalCount">0 screenshots</span>
      <button class="btn" onclick="document.getElementById('fileInput').click()">Upload</button>
      <button class="btn btn-outline" onclick="loadImages(true)">Refresh</button>
    </div>
  </div>
  <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">+</div>
    <p>Click or drag images here</p>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
  </div>
  <div id="uploadProgress">
    <div class="bar-bg"><div class="bar" id="uploadBar"></div></div>
    <div class="text" id="uploadText">Uploading...</div>
  </div>
  <div class="toolbar">
    <select id="sortSelect" onchange="loadImages(true)">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
    </select>
    <input type="text" id="searchInput" placeholder="Search filename..." oninput="loadImages(true)">
  </div>
  <div id="gallery" class="gallery"></div>
  <div id="emptyState">
    <div class="icon">📁</div>
    <p>No screenshots yet. Upload some!</p>
  </div>
  <button id="loadMoreBtn" onclick="loadMore()">Load more</button>
</div>
<div id="previewModal">
  <button class="close" onclick="closePreview()">&times;</button>
  <button class="nav prev" onclick="prevImage()">&lt;</button>
  <img id="previewImg" src="" alt="">
  <button class="nav next" onclick="nextImage()">&gt;</button>
  <div class="info" id="previewInfo"></div>
</div>
<script>
const CONFIG = { domain: '' };
let currentImages = [];
let currentIndex = 0;
let isLoading = false;
let pageToken = '';
const pageSize = 50;

async function apiCos(action, params) {
  const res = await fetch('/api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, params })
  });
  return res.json();
}

async function login() {
  const pwd = document.getElementById('passwordInput').value;
  try {
    const data = await apiCos('verify', { password: pwd });
    if (data.valid) {
      CONFIG.domain = data.domain;
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
      loadImages(true);
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (err) { document.getElementById('loginError').style.display = 'block'; }
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

const uploadZone = document.querySelector('.upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

async function handleFiles(files) {
  if (!files.length) return;
  document.getElementById('uploadProgress').style.display = 'block';
  let success = 0, fail = 0;
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    document.getElementById('uploadBar').style.width = ((i + 1) / files.length * 100) + '%';
    document.getElementById('uploadText').textContent = `Uploading ${i + 1}/${files.length}`;
    const reader = new FileReader();
    const base64 = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.readAsDataURL(f);
    });
    const ext = f.name.split('.').pop().toLowerCase();
    const key = 'screenshots/' + Date.now() + '_' + Math.random().toString(36).substr(2, 5) + '.' + ext;
    try {
      const res = await apiCos('upload', { key, body: base64 });
      if (res.success) success++;
      else fail++;
    } catch { fail++; }
  }
  document.getElementById('uploadProgress').style.display = 'none';
  showToast(`${success} success, ${fail} failed`, success > 0 ? 'success' : 'error');
  loadImages(true);
}

async function loadImages(refresh = false) {
  if (refresh) pageToken = '';
  if (isLoading) return;
  isLoading = true;
  try {
    const data = await apiCos('list', { marker: pageToken, maxKeys: pageSize });
    let images = [];
    if (data.files && Array.isArray(data.files)) {
      images = data.files.map(item => ({
        key: item.key,
        name: item.key.split('/').pop(),
        size: parseInt(item.size) || 0,
        lastModified: item.lastModified,
        url: item.url
      }));
    } else if (data.Contents) {
      images = (data.Contents || []).map(item => ({
        key: item.Key,
        name: item.Key.split('/').pop(),
        size: parseInt(item.Size) || 0,
        lastModified: item.LastModified,
        url: CONFIG.domain ? CONFIG.domain + '/' + item.Key : item.Key
      }));
    }
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    if (search) images = images.filter(img => img.name.toLowerCase().includes(search));
    const sort = document.getElementById('sortSelect').value;
    images.sort((a, b) => {
      const da = new Date(a.lastModified), db = new Date(b.lastModified);
      return sort === 'newest' ? db - da : da - db;
    });
    if (refresh) currentImages = images;
    else currentImages = currentImages.concat(images);
    renderGallery();
    document.getElementById('totalCount').textContent = currentImages.length + ' screenshots';
    document.getElementById('loadMoreBtn').style.display = 'none';
  } catch (err) { console.error(err); showToast('Load failed', 'error'); }
  finally { isLoading = false; }
}

function loadMore() { loadImages(false); }

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const empty = document.getElementById('emptyState');
  if (currentImages.length === 0) { gallery.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  gallery.innerHTML = currentImages.map((img, i) => `
    <div class="gallery-item" onclick="openPreview(${i})">
      <img src="${img.url}" alt="${img.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%231a1a2e%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2212%22>Error</text></svg>'">
      <div class="overlay"><span>${new Date(img.lastModified).toLocaleString()}</span></div>
      <button class="delete-btn" onclick="event.stopPropagation(); confirmDelete(${i})">&times;</button>
    </div>
  `).join('');
}

function openPreview(index) {
  currentIndex = index;
  document.getElementById('previewImg').src = currentImages[index].url;
  document.getElementById('previewInfo').textContent = `${index + 1} / ${currentImages.length}`;
  document.getElementById('previewModal').classList.add('show');
}

function closePreview() { document.getElementById('previewModal').classList.remove('show'); }
function prevImage() { currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length; openPreview(currentIndex); }
function nextImage() { currentIndex = (currentIndex + 1) % currentImages.length; openPreview(currentIndex); }

function confirmDelete(index) {
  if (!confirm('Delete this image?')) return;
  const img = currentImages[index];
  apiCos('delete', { key: img.key }).then(() => {
    currentImages.splice(index, 1);
    renderGallery();
    document.getElementById('totalCount').textContent = currentImages.length + ' screenshots';
    showToast('Deleted', 'success');
  }).catch(() => showToast('Delete failed', 'error'));
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('previewModal').classList.contains('show')) return;
  if (e.key === 'Escape') closePreview();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'ArrowRight') nextImage();
});
</script>
</body>
</html>
