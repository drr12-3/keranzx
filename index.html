<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenshot Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
  #loginPage { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  #loginPage h1 { font-size: 2rem; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; margin-bottom: 32px; font-size: 0.9rem; }
  .login-box { background: #16213e; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .login-box input { width: 100%; padding: 14px 16px; border: 1px solid #333; border-radius: 8px; background: #0f3460; color: #fff; font-size: 1rem; margin-bottom: 16px; outline: none; }
  .login-box input:focus { border-color: #e94560; }
  .login-box button { width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  #loginError { color: #ff6b6b; text-align: center; margin-top: 12px; font-size: 0.85rem; display: none; }
  #mainPage { display: none; min-height: 100vh; }
  .header { background: #16213e; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 1rem; color: #e94560; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn { background: #e94560; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .btn-icon { background: transparent; border: 1px solid #333; color: #888; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
  .btn-icon:hover, .btn-icon.active { border-color: #e94560; color: #e94560; }
  .count { color: #888; font-size: 0.8rem; }
  .time-filters { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
  .time-filters::-webkit-scrollbar { display: none; }
  .filter-chip { background: #16213e; border: 1px solid #333; color: #888; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; transition: all 0.2s; }
  .filter-chip:hover { border-color: #e94560; color: #e94560; }
  .filter-chip.active { background: #e94560; border-color: #e94560; color: #fff; }
  .search-bar { padding: 0 16px 12px; }
  .search-bar input { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 8px; background: #16213e; color: #fff; font-size: 0.9rem; outline: none; }
  .upload-zone { margin: 0 16px 16px; border: 2px dashed #333; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; }
  .upload-zone:hover { border-color: #e94560; }
  .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone p { color: #888; font-size: 0.85rem; }
  .upload-zone input { display: none; }
  #uploadProgress { display: none; margin: 0 16px 16px; background: #16213e; border-radius: 8px; padding: 12px; }
  #uploadProgress .bar-bg { background: #333; border-radius: 4px; height: 6px; overflow: hidden; }
  #uploadProgress .bar { height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b); width: 0%; transition: width 0.3s; }
  #uploadProgress .text { color: #888; font-size: 0.8rem; margin-top: 8px; text-align: center; }
  .gallery { display: grid; gap: 12px; padding: 0 16px 16px; }
  .gallery.grid-view { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .gallery.list-view { grid-template-columns: 1fr; gap: 8px; }
  .gallery-item { position: relative; border-radius: 10px; overflow: hidden; background: #16213e; cursor: pointer; }
  .gallery.grid-view .gallery-item { aspect-ratio: 1; }
  .gallery.grid-view .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
  .gallery.grid-view .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
  .gallery.grid-view .overlay span { font-size: 0.7rem; color: #ccc; }
  .gallery.list-view .gallery-item { display: flex; align-items: center; padding: 8px; gap: 12px; }
  .gallery.list-view .gallery-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .gallery.list-view .info { flex: 1; min-width: 0; }
  .gallery.list-view .info .name { font-size: 0.9rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gallery.list-view .info .date { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .gallery.list-view .overlay { display: none; }
  .delete-btn { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.6); color: #fff; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: none; }
  .gallery-item:hover .delete-btn { display: block; }
  #emptyState { text-align: center; padding: 60px 20px; color: #666; }
  #emptyState .icon { font-size: 3rem; margin-bottom: 12px; }
  #previewModal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
  #previewModal.show { display: flex; }
  #previewModal img { max-width: 90%; max-height: 70vh; border-radius: 8px; object-fit: contain; }
  #previewModal .close { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
  #previewModal .nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; width: 44px; height: 44px; border-radius: 8px; cursor: pointer; font-size: 1.5rem; }
  #previewModal .nav.prev { left: 12px; }
  #previewModal .nav.next { right: 12px; }
  #previewModal .preview-info { margin-top: 12px; color: #888; font-size: 0.85rem; text-align: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; z-index: 2000; }
  .toast.success { background: #10b981; color: #fff; }
  .toast.error { background: #ef4444; color: #fff; }
  @media (max-width: 480px) {
    .gallery.grid-view { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .gallery { padding: 0 12px 12px; }
    .header { padding: 10px 12px; }
    .gallery.list-view .gallery-item img { width: 50px; height: 50px; }
  }
</style>
</head>
<body>
<div id="loginPage">
  <h1>Screenshot Gallery</h1>
  <p class="subtitle">Enter password to access</p>
  <div class="login-box">
    <input type="password" id="passwordInput" placeholder="Password" onkeypress="if(event.key==='Enter')login()">
    <button onclick="login()">Enter</button>
    <div id="loginError">Incorrect password</div>
  </div>
</div>
<div id="mainPage">
  <div class="header">
    <h1>Gallery</h1>
    <div class="header-right">
      <span class="count" id="totalCount">0</span>
      <button class="btn-icon" id="viewToggle" onclick="toggleView()" title="Switch view">⊞</button>
      <button class="btn" onclick="document.getElementById('fileInput').click()">+ Upload</button>
      <button class="btn-icon" onclick="loadImages(true)" title="Refresh">↻</button>
    </div>
  </div>
  <div class="time-filters" id="timeFilters">
    <span class="filter-chip active" data-filter="all" onclick="setTimeFilter('all')">All</span>
    <span class="filter-chip" data-filter="today" onclick="setTimeFilter('today')">Today</span>
    <span class="filter-chip" data-filter="week" onclick="setTimeFilter('week')">This Week</span>
    <span class="filter-chip" data-filter="month" onclick="setTimeFilter('month')">This Month</span>
    <span class="filter-chip" data-filter="older" onclick="setTimeFilter('older')">Older</span>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by name..." oninput="filterAndRender()">
  </div>
  <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">+</div>
    <p>Tap to upload screenshots</p>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
  </div>
  <div id="uploadProgress">
    <div class="bar-bg"><div class="bar" id="uploadBar"></div></div>
    <div class="text" id="uploadText">Uploading...</div>
  </div>
  <div id="gallery" class="gallery grid-view"></div>
  <div id="emptyState">
    <div class="icon">📁</div>
    <p>No screenshots yet</p>
  </div>
</div>
<div id="previewModal">
  <button class="close" onclick="closePreview()">&times;</button>
  <button class="nav prev" onclick="prevImage()">&lt;</button>
  <img id="previewImg" src="" alt="">
  <button class="nav next" onclick="nextImage()">&gt;</button>
  <div class="preview-info" id="previewInfo"></div>
</div>
<script>
const CONFIG = { domain: '' };
let allImages = [];
let filteredImages = [];
let currentIndex = 0;
let isLoading = false;
let currentView = 'grid';
let currentTimeFilter = 'all';

async function apiCos(action, params) {
  const res = await fetch('/api', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, params }) });
  return res.json();
}

async function login() {
  const pwd = document.getElementById('passwordInput').value;
  try {
    const data = await apiCos('verify', { password: pwd });
    if (data.valid) { CONFIG.domain = data.domain; document.getElementById('loginPage').style.display = 'none'; document.getElementById('mainPage').style.display = 'block'; loadImages(true); }
    else document.getElementById('loginError').style.display = 'block';
  } catch { document.getElementById('loginError').style.display = 'block'; }
}

function showToast(msg, type) {
  const t = document.createElement('div'); t.className = 'toast ' + type; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
}

const uploadZone = document.querySelector('.upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

async function handleFiles(files) {
  if (!files.length) return;
  document.getElementById('uploadProgress').style.display = 'block';
  let success = 0, fail = 0;
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    document.getElementById('uploadBar').style.width = ((i + 1) / files.length * 100) + '%';
    document.getElementById('uploadText').textContent = `Uploading ${i + 1}/${files.length}`;
    const reader = new FileReader();
    const base64 = await new Promise(resolve => { reader.onload = e => resolve(e.target.result.split(',')[1]); reader.readAsDataURL(f); });
    const ext = f.name.split('.').pop().toLowerCase();
    const key = 'screenshots/' + Date.now() + '_' + Math.random().toString(36).substr(2, 5) + '.' + ext;
    try { const res = await apiCos('upload', { key, body: base64 }); if (res.success) success++; else fail++; } catch { fail++; }
  }
  document.getElementById('uploadProgress').style.display = 'none';
  showToast(`${success} uploaded, ${fail} failed`, success > 0 ? 'success' : 'error');
  loadImages(true);
}

async function loadImages(refresh = false) {
  if (isLoading) return;
  isLoading = true;
  try {
    const data = await apiCos('list', { marker: '', maxKeys: 1000 });
    if (data.files && Array.isArray(data.files)) {
      allImages = data.files.map(item => ({ key: item.key, name: item.key.split('/').pop(), size: parseInt(item.size) || 0, lastModified: item.lastModified, url: item.url }));
    } else if (data.Contents) {
      allImages = (data.Contents || []).map(item => ({ key: item.Key, name: item.Key.split('/').pop(), size: parseInt(item.Size) || 0, lastModified: item.LastModified, url: CONFIG.domain ? CONFIG.domain + '/' + item.Key : item.Key }));
    }
    allImages.sort((a, b) => new Date(b.lastModified) - new Date(a.lastModified));
    filterAndRender();
  } catch (err) { console.error(err); showToast('Load failed', 'error'); }
  finally { isLoading = false; }
}

function filterAndRender() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
  const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
  
  filteredImages = allImages.filter(img => {
    const date = new Date(img.lastModified);
    let matchTime = true, matchSearch = true;
    if (currentTimeFilter === 'today') matchTime = date >= today;
    else if (currentTimeFilter === 'week') matchTime = date >= weekAgo && date < today;
    else if (currentTimeFilter === 'month') matchTime = date >= monthAgo && date < weekAgo;
    else if (currentTimeFilter === 'older') matchTime = date < monthAgo;
    if (query) matchSearch = img.name.toLowerCase().includes(query);
    return matchTime && matchSearch;
  });
  document.getElementById('totalCount').textContent = filteredImages.length;
  renderGallery();
}

function renderGallery() {
  const gallery = document.getElementById('gallery');
  const empty = document.getElementById('emptyState');
  if (filteredImages.length === 0) { gallery.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  gallery.className = 'gallery ' + currentView + '-view';
  gallery.innerHTML = filteredImages.map((img, i) => {
    const dateStr = formatDate(img.lastModified);
    if (currentView === 'grid') {
      return `<div class="gallery-item" onclick="openPreview(${i})"><img src="${img.url}" alt="${img.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2316213e%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2212%22>?</text></svg>'"><div class="overlay"><span>${dateStr}</span></div><button class="delete-btn" onclick="event.stopPropagation(); confirmDelete(${i})">&times;</button></div>`;
    } else {
      return `<div class="gallery-item" onclick="openPreview(${i})"><img src="${img.url}" alt="${img.name}" loading="lazy"><div class="info"><div class="name">${img.name}</div><div class="date">${dateStr}</div></div><button class="delete-btn" onclick="event.stopPropagation(); confirmDelete(${i})">&times;</button></div>`;
    }
  }).join('');
}

function toggleView() {
  currentView = currentView === 'grid' ? 'list' : 'grid';
  const btn = document.getElementById('viewToggle');
  btn.textContent = currentView === 'grid' ? '⊞' : '▦';
  btn.classList.toggle('active', currentView === 'list');
  renderGallery();
}

function setTimeFilter(filter) {
  currentTimeFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(chip => { chip.classList.toggle('active', chip.dataset.filter === filter); });
  filterAndRender();
}

function formatDate(str) {
  const d = new Date(str);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const date = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (date.getTime() === today.getTime()) return `Today ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function openPreview(index) { currentIndex = index; const img = filteredImages[index]; document.getElementById('previewImg').src = img.url; document.getElementById('previewInfo').textContent = img.name; document.getElementById('previewModal').classList.add('show'); }
function closePreview() { document.getElementById('previewModal').classList.remove('show'); }
function prevImage() { currentIndex = (currentIndex - 1 + filteredImages.length) % filteredImages.length; openPreview(currentIndex); }
function nextImage() { currentIndex = (currentIndex + 1) % filteredImages.length; openPreview(currentIndex); }

function confirmDelete(index) {
  if (!confirm('Delete?')) return;
  const img = filteredImages[index];
  apiCos('delete', { key: img.key }).then(() => { allImages = allImages.filter(i => i.key !== img.key); filterAndRender(); showToast('Deleted', 'success'); }).catch(() => showToast('Delete failed', 'error'));
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('previewModal').classList.contains('show')) return;
  if (e.key === 'Escape') closePreview();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'ArrowRight') nextImage();
});
</script>
</body>
</html>
